<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">QingNest logo</title>
  <desc id="desc">A glowing Q shaped nest mark for QingNest.</desc>
  <defs>
    <linearGradient id="qn-ring" x1="11" y1="10" x2="54" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="0.42" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="qn-nest" x1="18" y1="25" x2="47" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.52" stop-color="#a5f3fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="qn-glow" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="0.52" stop-color="#082f49"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <filter id="qn-soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.86 0 0 0 0 1 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="#020617"/>
  <circle cx="32" cy="32" r="29" fill="url(#qn-glow)" opacity="0.72"/>
  <path
    d="M43.2 47.2a21.5 21.5 0 1 1 4.1-4.6"
    fill="none"
    stroke="url(#qn-ring)"
    stroke-width="5"
    stroke-linecap="round"
    filter="url(#qn-soft-glow)"
  />
  <path
    d="M43.8 43.8 52.4 52.4"
    fill="none"
    stroke="url(#qn-ring)"
    stroke-width="5"
    stroke-linecap="round"
    filter="url(#qn-soft-glow)"
  />
  <path
    d="M18.8 35.2c6.7-7.5 19.5-7.5 26.4 0"
    fill="none"
    stroke="url(#qn-nest)"
    stroke-width="3.4"
    stroke-linecap="round"
  />
  <path
    d="M22.8 40.1c5.2-4.5 13.5-4.5 18.6 0"
    fill="none"
    stroke="#67e8f9"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.9"
  />
  <path
    d="M27.7 29.6 32 25.5l4.3 4.1"
    fill="none"
    stroke="#f8fafc"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <circle cx="32" cy="34.1" r="2.9" fill="#f8fafc"/>
</svg>
