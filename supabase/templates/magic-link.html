<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>你的 QingNest 轻巢登录链接</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f7fb;color:#152033;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif;">
    <main style="width:100%;max-width:640px;margin:0 auto;padding:32px 20px;">
      <section style="background:#fff;border:1px solid #dbe4ef;border-radius:18px;padding:28px;box-shadow:0 14px 36px rgba(15,23,42,.08);">
        <p style="margin:0 0 4px;color:#0f766e;font-size:13px;font-weight:700;">QingNest 轻巢</p>
        <h1 style="margin:0 0 18px;color:#0f172a;font-size:26px;line-height:32px;">登录链接</h1>
        <p style="margin:0 0 24px;font-size:16px;line-height:28px;color:#334155;">
          点击下面的按钮登录 QingNest 轻巢。这个链接会在短时间后过期，且只能使用一次。
        </p>
        <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:13px 22px;border-radius:10px;background:#0f766e;color:#fff;font-size:15px;font-weight:700;text-decoration:none;">登录 QingNest</a>
        <p style="margin:24px 0 0;color:#64748b;font-size:13px;line-height:22px;">
          如果不是你本人请求，可以忽略这封邮件。
        </p>
      </section>
    </main>
  </body>
</html>
